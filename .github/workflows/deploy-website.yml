name: Deploy Reference V1 Website

on:
  workflow_dispatch:

concurrency:
  group: deploy-reference-v1-website-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build And Deploy

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: reference/v1/pnpm-lock.yaml

      - run: pnpm --dir reference/v1 install --frozen-lockfile

      - name: Build website
        run: pnpm --dir reference/v1 turbo run build --filter=@stoneforge/website

      - name: Deploy to Cloudflare Pages
        working-directory: reference/v1/apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy dist --project-name=stoneforge-ai --branch=reference-v1
