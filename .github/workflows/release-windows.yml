name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create release directory
        run: |
          mkdir stoneforge-windows

          # Copy built packages
          xcopy packages\core\dist stoneforge-windows\packages\core\dist\ /E /I /Q
          xcopy packages\storage\dist stoneforge-windows\packages\storage\dist\ /E /I /Q
          xcopy packages\quarry\dist stoneforge-windows\packages\quarry\dist\ /E /I /Q
          xcopy packages\smithy\dist stoneforge-windows\packages\smithy\dist\ /E /I /Q
          xcopy packages\shared-routes\dist stoneforge-windows\packages\shared-routes\dist\ /E /I /Q

          # Copy web dashboard assets
          xcopy packages\smithy\web stoneforge-windows\packages\smithy\web\ /E /I /Q

          # Copy package.json files (needed for module resolution)
          copy packages\core\package.json stoneforge-windows\packages\core\
          copy packages\storage\package.json stoneforge-windows\packages\storage\
          copy packages\quarry\package.json stoneforge-windows\packages\quarry\
          copy packages\smithy\package.json stoneforge-windows\packages\smithy\
          copy packages\shared-routes\package.json stoneforge-windows\packages\shared-routes\

          # Copy node_modules (runtime dependencies)
          xcopy node_modules stoneforge-windows\node_modules\ /E /I /Q

          # Copy launcher and docs
          copy launch.bat stoneforge-windows\
          copy GETTING_STARTED.md stoneforge-windows\
          copy DASHBOARD_GUIDE.md stoneforge-windows\
          copy FIRST_TASK.md stoneforge-windows\

      - name: Create ZIP
        run: Compress-Archive -Path stoneforge-windows -DestinationPath stoneforge-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stoneforge-windows
          path: stoneforge-windows.zip

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stoneforge-windows.zip
          body: |
            ## Windows Quick Start

            1. Install [Node.js](https://nodejs.org/) (LTS version)
            2. Download `stoneforge-windows.zip` below
            3. Extract the ZIP to a folder
            4. Double-click `launch.bat`
            5. Dashboard opens in your browser at http://localhost:3457

            For AI agents to work, also install [Claude Code](https://www.npmjs.com/package/@anthropic-ai/claude-code):
            ```
            npm install -g @anthropic-ai/claude-code
            ```
