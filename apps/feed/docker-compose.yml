services:
  feed:
    build: .
    ports:
      - "${FEED_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - SYNC_MODE=${SYNC_MODE:-false}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - TRUST_PROXY=${TRUST_PROXY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - feed-data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      - POSTGRES_USER=${PG_USER:-stoneforge}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-stoneforge}
      - POSTGRES_DB=${PG_DB:-feed}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-stoneforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  feed-data:
  pg-data:
